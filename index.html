<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SHUNYA | Digital Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.2);
            --text: #FFFFFF;
            --danger: #ff4444;
            --success: #4CAF50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        /* Typography & Header */
        h1,
        h2,
        h3 {
            font-family: 'Cinzel', serif;
            font-weight: 800;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            border-bottom: 1px solid #222;
            background: rgba(5, 5, 5, 0.92);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand {
            color: var(--gold);
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .brand span {
            color: #fff;
            font-weight: 300;
        }
        .wallet-display {
            color: var(--gold);
            font-weight: 600;
            font-family: monospace;
            background: #111;
            padding: 6px 14px;
            border-radius: 4px;
            border: 1px solid #333;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .wallet-display:hover {
            border-color: var(--gold);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        /* Layout & Pages */
        .page {
            display: none;
            padding: 30px 5%;
            animation: fadeIn 0.4s ease;
        }
        .page.active {
            display: block;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        @keyframes coinDrop {
            0% {
                opacity: 1;
                transform: translateY(-20px) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(80px) scale(1.2);
            }
        }

        /* Asset Cards */
        .card {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--gold-glow);
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 2px solid #222;
            transition: 0.3s;
        }
        .card:hover img {
            border-bottom-color: var(--gold);
        }
        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-title {
            margin-bottom: 6px;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 700;
        }
        .card-subtitle {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 12px;
        }
        .price-tag {
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: #888;
            font-family: monospace;
        }
        .reward-tag {
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--gold);
            color: #000;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.completed {
            background: #2e7d32;
            color: #fff;
        }
        .badge.owned {
            background: #1a237e;
            color: #fff;
        }

        /* Buttons */
        .btn-gold {
            background: linear-gradient(135deg, #B8860B, #D4AF37);
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
        }
        .btn-gold:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px var(--gold-glow);
            transform: scale(1.02);
        }
        .btn-gold:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-dark {
            background: #161616;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-dark:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: #1a1a1a;
        }
        .btn-danger {
            background: #b71c1c;
            border: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .btn-danger:hover {
            background: #d32f2f;
            transform: scale(1.02);
        }

        /* Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 14px 0;
            border-top: 1px solid #222;
            z-index: 1000;
        }
        .nav-item {
            cursor: pointer;
            color: #555;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
        }
        .nav-item .nav-icon {
            font-size: 1.2rem;
        }
        .nav-item.active {
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold-glow);
        }
        .nav-item:hover {
            color: #fff;
        }
        .nav-item .nav-badge {
            position: absolute;
            top: -6px;
            right: -10px;
            background: #ff4444;
            color: #fff;
            font-size: 0.55rem;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 800;
        }

        /* Modals & Overlays */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid #333;
            max-width: 480px;
            width: 92%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            position: relative;
            animation: fadeIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h2 {
            color: var(--gold);
            margin-bottom: 8px;
        }
        .modal-box .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #666;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-box .close-btn:hover {
            color: #fff;
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            max-width: 360px;
            width: 90%;
        }
        .toast {
            padding: 14px 18px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid;
            pointer-events: auto;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast.success {
            background: #0a0a0a;
            color: var(--gold);
            border-color: var(--gold);
        }
        .toast.error {
            background: #0a0a0a;
            color: var(--danger);
            border-color: var(--danger);
        }
        .toast.info {
            background: #0a0a0a;
            color: #64b5f6;
            border-color: #64b5f6;
        }

        /* Wallet Dashboard */
        .dashboard-panel {
            padding: 40px 30px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .dashboard-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--gold-glow), transparent 70%);
            opacity: 0.05;
            pointer-events: none;
        }
        .rank-display {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 2px;
            margin-top: 8px;
        }
        .rank-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }
        .rank-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #B8860B, #D4AF37);
            border-radius: 2px;
            transition: width 0.6s ease;
        }
        .rank-progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: #555;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Transaction History */
        .tx-list {
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .tx-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.8rem;
            font-family: monospace;
        }
        .tx-item .tx-amount {
            font-weight: 700;
        }
        .tx-item .tx-amount.positive {
            color: var(--gold);
        }
        .tx-item .tx-amount.negative {
            color: var(--danger);
        }
        .tx-item .tx-date {
            color: #555;
            font-size: 0.7rem;
        }

        /* Admin Panel */
        .admin-panel {
            margin-top: 40px;
            padding: 30px;
            background: #080808;
            border: 1px solid #222;
            border-left: 3px solid var(--gold);
            border-radius: 4px;
        }
        .admin-panel h3 {
            color: var(--gold);
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
        .admin-panel .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .admin-panel input,
        .admin-panel select {
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            transition: 0.3s;
            width: 100%;
        }
        .admin-panel input:focus,
        .admin-panel select:focus {
            border-color: var(--gold);
        }
        .admin-panel input::placeholder {
            color: #555;
        }
        .admin-panel .full-width {
            grid-column: span 2;
        }

        /* My Assets */
        .asset-chip {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #aaa;
            margin: 4px;
        }
        .asset-chip .chip-gold {
            color: var(--gold);
        }

        /* Mission / Daily Task */
        .mission-card {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            margin-bottom: 12px;
        }
        .mission-card:hover {
            border-color: var(--gold);
        }
        .mission-card .mission-info h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .mission-card .mission-info p {
            font-size: 0.8rem;
            color: #666;
        }
        .mission-card .mission-reward {
            color: var(--gold);
            font-weight: 700;
            font-size: 0.9rem;
        }
        .mission-card .mission-btn {
            min-width: 100px;
        }

        /* Coin animation */
        .coin-float {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 9998;
            animation: coinDrop 1s ease-out forwards;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header {
                padding: 0.8rem 4%;
            }
            .brand {
                font-size: 1.1rem;
            }
            .wallet-display {
                font-size: 0.75rem;
                padding: 4px 10px;
            }
            .page {
                padding: 16px 4%;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .dashboard-panel {
                padding: 24px 16px;
            }
            .admin-panel .form-row {
                grid-template-columns: 1fr;
            }
            .admin-panel .full-width {
                grid-column: span 1;
            }
            .modal-box {
                padding: 1.5rem;
                width: 95%;
            }
            .mission-card {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
                text-align: center;
            }
            .mission-card .mission-btn {
                width: 100%;
            }
            #toast-container {
                top: 10px;
                right: 10px;
                width: 95%;
            }
        }

        /* Small utility */
        .text-gold {
            color: var(--gold);
        }
        .text-muted {
            color: #666;
        }
        .mt-12 {
            margin-top: 12px;
        }
        .mt-20 {
            margin-top: 20px;
        }
        .mb-12 {
            margin-bottom: 12px;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .gap-8 {
            gap: 8px;
        }
        .fw-800 {
            font-weight: 800;
        }

        /* Quiz modal specific */
        .quiz-option-btn {
            text-align: left;
            font-size: 0.9rem;
            padding: 12px 16px;
            background: #161616;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
        }
        .quiz-option-btn:hover {
            border-color: var(--gold);
            background: #1a1a1a;
        }
        .quiz-option-btn.correct {
            border-color: #4CAF50;
            background: #1a3a1a;
        }
        .quiz-option-btn.wrong {
            border-color: var(--danger);
            background: #3a1a1a;
        }
        .quiz-option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">THE <span>SHUNYA</span></div>
        <div class="wallet-display" id="header-wallet" onclick="switchTab('wallet', document.querySelector('.nav-item[data-tab=\'wallet\']'))">
            🪙 <span id="header-balance">0</span>
        </div>
    </header>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <div class="container">
            <h1 style="font-size: 2.2rem; margin-bottom: 6px;">Welcome,
