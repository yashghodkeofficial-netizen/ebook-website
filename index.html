<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Common Mistakes at 21</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
}

header{
background:#000;
padding:25px;
text-align:center;
}

header h1{
font-size:38px;
color:#FFD700;
}

header p{
margin-top:10px;
font-size:20px;
color:#bbb;
}

.hero{
padding:25px;
text-align:center;
}

.cover{
width:95%;
max-width:420px;
border-radius:18px;
box-shadow:0 0 30px gold;
}

.price{
font-size:42px;
font-weight:bold;
color:#00ff88;
margin-top:20px;
}

.buy{
display:inline-block;
margin-top:25px;
padding:18px 45px;
background:#ff9800;
color:white;
font-size:28px;
border-radius:14px;
text-decoration:none;
transition:.3s;
}

.buy:hover{
background:#ffb300;
transform:scale(1.05);
}

.section{
padding:30px;
}

.section h2{
color:#FFD700;
margin-bottom:20px;
font-size:34px;
}

.section p{
font-size:22px;
line-height:1.8;
color:#ddd;
}
.qr{
width:250px;
border-radius:15px;
margin-top:20px;
}

footer{
background:#000;
padding:30px;
text-align:center;
font-size:18px;
color:#999;
margin-top:40px;
}

.admin{
background:#111;
padding:30px;
margin:30px;
border-radius:15px;
}

.admin input{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
}

.admin button{
padding:15px 30px;
background:#FFD700;
border:none;
font-size:20px;
cursor:pointer;
border-radius:10px;
}

.course{
background:#1b1b1b;
padding:20px;
border-radius:15px;
margin-top:20px;
display:none;
}

.course img{
width:100%;
border-radius:10px;
}

.course h3{
margin-top:15px;
font-size:28px;
}

.course a{
display:inline-block;
margin-top:15px;
padding:12px 30px;
background:#00c853;
color:white;
text-decoration:none;
border-radius:10px;
font-size:20px;
}

</style>
</head>
<body>

<header>
<h1>Common Mistakes at 21</h1>
<p>Author : THE SHUNYA</p>
</header>

<div class="hero">

<img src="1_20260710_140904_0000.png" class="cover">

<div class="price">₹99 Only</div>

</div>
